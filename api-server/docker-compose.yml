networks:
  backend:

services:
  api:
    image: chl11wq12/kosta-api:v1.0.0
    platform: linux/amd64
    build: .
    container_name: api
    env_file:
      - .env
    ports:
      - "${API_PORT}:${API_PORT}"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend

  db:
    image: mysql:8
    platform: linux/amd64
    container_name: db
    ports:
      - "${DB_PORT}:${DB_PORT}"
    env_file: .env
    environment:
      MYSQL_ROOT_PASSWORD: "${DB_ROOT_PASSWORD}"
      MYSQL_DATABASE: "${DB_NAME}"
      MYSQL_USER: "${DB_USER}"
      MYSQL_PASSWORD: "${DB_PASSWORD}"
    volumes:
      - data:/var/lib/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-uroot", "-p${DB_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 10s
      retries: 10
    networks:
      - backend

volumes:
  data:
